version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: docker/main_project/Dockerfile
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  celery:
    build:
      context: .
      dockerfile: docker/celery/Dockerfile
    container_name: celery_worker
    command: celery -A refresh_celery_reddis worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"